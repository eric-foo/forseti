# Aphrodite Fragrance Sub-Ontology — reference data v0
#
# Schema-light reference DATA on the adopted Orca/Forseti ontology backbone
# (forseti_ontology_backbone_architecture_v0.md, ADOPTED 2026-06-15; windcaller_kind
# amendment 2026-07-04). Houses are `brand:` entries, fragrances are `product:`
# entries, creators are `windcaller:creator.*` entries — all per the §2.1 dotted-ID
# grammar. This file is DATA, not schema: the backbone freezes no property lists,
# and nothing here mints a type, link, or gate.
#
# FIELD VOCABULARY (the stable surface a downstream deriver may bind to — see the
# build's spec contract; everything else is free-form):
#   note_families, accords, tier, occasions, dupe_of, windcaller_kind,
#   provenance (per-fact: a source ref OR the literal marker
#   `operator_asserted_pending_source` — never neither).
# `dupe_of` is directional: the dupe points at the original it imitates.
# Vocabulary values (note-family / accord / tier / occasion term lists) are data
# entries below, provenance-marked like any fact.
#
# EXTENSION PATTERN (cold-agent usable, no schema edit needed):
#   1. Add a `brand:<slug>` entry under `houses:` (name, tier, provenance).
#   2. Add a `product:<house>.<slug>` entry under `products:` (name, house,
#      note_families, accords, tier, occasions, dupe_of, provenance per fact).
#   3. Use only vocabulary values listed under `vocabulary:`, or add the new
#      value there WITH its own provenance line.
#   4. Every fact gets a `provenance:` entry (source ref or the marker).
#   5. Run the ontology gates exactly as supported:
#      check_ontology_ssot.py --strict; check_ontology_expansion.py --health;
#      check_ontology_tag_validity.py --strict; check_ontology_drift.py --strict.
#
# PROVENANCE RULE (co-#1, per the build handoff's frozen decisions): a fact with
# neither a source ref nor the marker MUST NOT be added. `operator_asserted_
# pending_source` facts are operator market knowledge awaiting a real fragrance
# reference; they may inform derivation but must not be displayed as sourced
# evidence (see aphrodite_derived_claim_provenance_contract_v0.md for the
# display-side discipline).
#
# EXCLUDED PENDING SOURCE: the round-2 SoV extraction's clone/niche tail (~13%
# low-confidence, mostly Arabic/clone-house ASR garbles — Lattafa, Afnan, Ahmed
# Al Maghribi lines) is deliberately NOT in this graph; it enters only after
# re-verification against a real fragrance reference. The rehearsal slice's four
# unresolved candidates ("Mekonos … Milk Trox", "Emerald by Game of Spades",
# "Roasted Sugar", "Unikomotiv") stay abstained per that slice's build rule.
#
# NON-CLAIMS: reference data, dated and fail-soft — not a registry, not
# validation, not readiness, not fact-correctness; product_learning-capped.
# A green hook run is conformance shape, not fact truth.

