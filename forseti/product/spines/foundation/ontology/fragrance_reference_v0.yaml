fragrantica_sourcing_run:
  date: 2026-07-04
  coverage: >
    15 of 16 products fetched from fragrantica.com public logged-out pages
    (product:fragrance-one.the-man is not listed there — brand catalog of 23
    products enumerated — nor found via two bounded Parfumo fallback attempts).
  method: >
    Owner-authorized bounded sourcing run per the Source Capture Toolbox
    anti-blocking ladder, first re-probe rung only (browser-realistic headers;
    no proxy, no browser automation, no login, no credential use, no
    access-control bypass). Sequential requests, ~4.5s spacing, 31 total HTTP
    requests. Product URLs resolved via each house's public designer catalog
    page, never guessed numeric IDs.
  yields: >
    main accords (now the `accords` field, verbatim), note pyramids (now the
    `notes` field, verbatim), and note_families re-derived via
    vocabulary.accord_to_family_mapping. tier and occasions were NOT sourced by
    this run and keep their prior provenance.
  dupe_data: >
    none capturable — Fragrantica's "reminds me of" widget hydrates client-side
    (post-load XHR) and is absent from static HTML; dupe_relationships stays
    empty pending a citable source.

vocabulary:
  note_families:
    values: [citrus, floral, woody, amber, fresh, aquatic, aromatic, fougere, gourmand, musk, spicy, green, fruity, leather, powdery, sweet]
    provenance: operator_asserted_pending_source   # standard perfumery taxonomy; bind to a real reference when one is authorized
  tiers:
    values: [designer, niche, luxury, creator-owned-dtc, clone-house, adjacent]
    provenance: "tier is an OPERATOR CLASSIFICATION under the rubric below, not an external fact; rubric adopted 2026-07-05 (proposed cross-vendor by OpenAI ChatGPT from this file, adversarially reviewed and adjudicated in-lane); original usage grounded in docs/research/aphrodite_depth_rehearsal_ontology_slice_v0.md houses table"
    rubric:
      designer: >
        Fashion/designer or major beauty label selling named fragrances through
        broad selective retail (department stores, beauty counters, duty-free)
        at mainstream-premium pricing. A luxury-fashion house classifies as
        designer when its fragrance business is broadly distributed as a
        designer beauty line.
      niche: >
        Fragrance-first house whose public identity is perfumery rather than
        fashion/beauty licensing; boutique/specialty distribution, premium
        pricing. On price overlap with luxury, use niche unless the house's
        main consumer identity is a non-fragrance luxury maison.
      luxury: >
        Luxury maison fragrance line with tightly controlled maison/boutique
        distribution and luxury positioning — fragrance as an extension of
        leather goods/fashion rather than a broad beauty-counter license. Use
        over designer only when distribution is more exclusive than standard
        designer fragrance.
      creator-owned-dtc: >
        Creator/founder persona is central to demand; sales primarily
        direct-to-consumer/community commerce. Overrides niche/designer when
        the creator channel is a primary public fact.
      clone-house: >
        Core public proposition is dupes/inspirations/lower-cost alternatives
        to named fragrances. Overrides price, channel, and niche-like
        presentation when imitation is explicit.
      adjacent: >
        Scent/wellness/home/mood products that are not primarily wearable fine
        fragrance; applies when the format or brand promise sits outside
        personal fragrance even if scent is central.
      inheritance: products inherit the house tier unless the product itself is explicitly a dupe/clone or an adjacent non-wearable scent line.
      tie_break_order: [clone-house, creator-owned-dtc, adjacent, luxury, niche, designer]   # 2026-07-05 (R0): canonicalized to tiers.values vocabulary (was adjacent-format / luxury-exclusivity / niche-fragrance-first)
  occasions:
    values: [daily, office, evening, formal, casual, night-out, summer, winter, spring, fall, versatile]
    provenance: operator_asserted_pending_source
  accords_note: >
    Accords are free-vocabulary strings (schema-light); each product's accord
    list carries its own provenance line. As of the 2026-07-04 Fragrantica
    sourcing run, `accords` holds the source's main accords verbatim and the
    free-form `notes` field holds the top/middle/base pyramid verbatim.
  accord_to_family_mapping:
    rule: >
      For Fragrantica-sourced products, note_families is DERIVED from the
      product's main accords via this table (operator-defined 2026-07-04).
      Accords not in the table stay accords-only and contribute no family; a
      compound accord may map to two families. The table is data — amend it
      with provenance like any fact.
    map:
      fresh: [fresh]
      fresh spicy: [fresh, spicy]
      warm spicy: [spicy]
      cinnamon: [spicy]
      citrus: [citrus]
      aromatic: [aromatic]
      woody: [woody]
      amber: [amber]
      musky: [musk]
      fruity: [fruity]
      sweet: [sweet]
      vanilla: [gourmand]
      cacao: [gourmand]
      white floral: [floral]
      floral: [floral]
      rose: [floral]
      powdery: [powdery]
      green: [green]
      leather: [leather]
      marine: [aquatic]
    unmapped_observed: [smoky, aldehydic, soapy, patchouli]   # accords-only pending a vocabulary decision
    proposed_additions_pending_owner: [{term: chypre, vocabulary: note_families, basis: "cross-vendor proposal 2026-07-05 (Aventus-style fruity-chypre not representable); NOT adopted — owner vocabulary decision"}]
    provenance: "operator-defined mapping, 2026-07-04 (adjudicated with the Fragrantica sourcing run)"

