# repo-structure.yaml - Forseti machine structure map (the router, not the authority).
# Single machine-readable source consumed by .agents/hooks/check_placement.py and
# by agents for navigation. Placement RULES are owned by
# .agents/workflow-overlay/artifact-folders.md; the binding and parameters by
# docs/decisions/orca_repo_structure_binding_v0.md. On conflict the overlay wins
# and this map is the stale party. Schema keys are frozen by the binding.
version: 1
status: experimental_bound_v0

authority:
  placement_rules: .agents/workflow-overlay/artifact-folders.md
  binding: docs/decisions/orca_repo_structure_binding_v0.md
  note: router_only_not_authority_not_validation

entry_points:
  start_here: AGENTS.md
  docs_readme: docs/README.md
  docs_guide: docs/STRUCTURE.md
  route_card: docs/workflows/forseti_repo_map_v0.md
  legacy_route_card: docs/workflows/orca_repo_map_v0.md
  product: forseti/product/README.md
  product_corpus: forseti/product/README.md
  harness: forseti-harness/README.md

# Exhaustive allowed top-level entries. Anything else at repo root is unplaced.
known_top_level:
  dirs:
    - .agents
    - .claude
    - .codex
    - .github
    - .githooks
    - docs
    - forseti            # canonical Forseti identity/product root; product entrypoints route through forseti/product/.
    - forseti-harness    # canonical runtime harness root.
    - worktrees          # tracked lane pointer/metadata records; not a live source root.
  files:
    - .gitattributes
    - .gitignore
    - .tmp_head_restore.md
    - AGENTS.md
    - CLAUDE.md
    - README.md
    - repo-structure.yaml

# docs/ role grammar (bound in artifact-folders.md; listed here for routing only).
docs_roles:
  - { home: docs/decisions, entry: docs/decisions/README.md }
  - { home: docs/prompts, entry: docs/prompts }
  - { home: docs/research, entry: docs/research/README.md }
  - { home: docs/review-inputs, entry: docs/review-inputs }
  - { home: docs/review-outputs, entry: docs/review-outputs }
  - { home: docs/workflows, entry: docs/workflows/forseti_repo_map_v0.md }
  - { home: docs/migration, entry: docs/migration }
  - { home: docs/hygiene, entry: docs/hygiene/queue.md }
  - { home: docs/_inbox, entry: docs/_inbox/README.md }

# docs/product/ second-level lanes retired by spine-first migration Wave E.
# Keep the schema key present; the canonical product front door is now
# forseti/product/.
product_lanes: []

# Runtime/scratch: excluded from placement evaluation wherever they sit.
scratch_rules:
  underscore_prefix_dirs: true        # any path segment starting with "_"
  generated_patterns:
    - __pycache__
    - .pytest_cache
    - "*.egg-info"
    - "pytest-cache-files-*"
    - "pytest_run_*"
    - "pytest_tmp*"
    - "pytest_*_tmp"
    - "pytest_source_observability_runner_tmp"
    - node_modules

# Known placement exclusions the checker tolerates (WARN-only, never strict-fail).
legacy_tolerated:
                                      # (single '*' never crosses '/' - lanes
                                      # are evaluated normally)
  - "forseti-harness/**"                 # harness INTERNAL layout is not evaluated
                                      # in v0; top-level scratch noise retired by
                                      # the Phase-2 pytest/uv config consolidation

inbox:
  home: docs/_inbox
  max_age_days: 30                    # advisory hygiene signal only

# Trees never evaluated for placement (config, VCS, worktrees, other repos).
# Linked worktrees live OUTSIDE the repo in the sibling container
# ../orca-worktrees/ (legacy local convention, 2026-06-11; git worktree list is the truth);
# .codex/worktrees/ is the codex-managed in-repo exception.
excluded:
  - .git
  - .github
  - .githooks
  - .claude
  - .codex
  - .agents          # governance internals; layout owned by the overlay itself
  - worktrees        # tracked lane pointer/metadata records; not evaluated as source
