name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  forseti-harness-tests:
    name: forseti-harness-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORSETI_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    defaults:
      run:
        working-directory: forseti-harness
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history needed for git diff ...HEAD diff-scoping in header_index --strict
      - name: Verify event-aware diff base
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          if [[ ! "$FORSETI_DIFF_BASE" =~ ^[0-9a-fA-F]{40}$ ]] || [[ "$FORSETI_DIFF_BASE" =~ ^0+$ ]]; then
            echo "::error::CI diff base is missing, zero, or malformed for event '$GITHUB_EVENT_NAME'"
            exit 1
          fi
          if ! git cat-file -e "${FORSETI_DIFF_BASE}^{commit}" 2>/dev/null; then
            echo "::error::CI diff base $FORSETI_DIFF_BASE is not resolvable after full-history checkout"
            exit 1
          fi
          echo "CI diff base: $FORSETI_DIFF_BASE"
      - name: Classify pytest scope
        id: pytest-scope
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          run_pytest=true

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            # Capture the diff through command substitution (not process
            # substitution) so a git failure is visible and fails the job
            # instead of silently classifying from partial or empty output.
            if ! changed_output="$(git diff --no-renames --name-only "$FORSETI_DIFF_BASE"...HEAD)"; then
              echo "::error::git diff failed while classifying pytest scope against base $FORSETI_DIFF_BASE"
              exit 1
            fi
            mapfile -t changed_paths < <(printf '%s' "$changed_output")

            if (( ${#changed_paths[@]} > 0 )); then
              run_pytest=false
              for path in "${changed_paths[@]}"; do
                if [[ ! "$path" =~ ^docs/.+\.md$ ]]; then
                  run_pytest=true
                  break
                fi
              done
            fi
          fi

          echo "run_pytest=$run_pytest" >> "$GITHUB_OUTPUT"
          echo "Run full pytest: $run_pytest" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install forseti-harness (core) + pytest
        run: |
          python -m pip install --upgrade pip
          # pyyaml is pinned explicitly (not left transitive) so the strict
          # yaml-backed gates (ontology SSOT/drift, deletion-evidence) cannot
          # silently fail-open if a dependency edit drops it.
          python -m pip install -e . "pytest==9.0.3" "pytest-xdist==3.8.0" pyyaml
      - name: source-input hash freshness (source pointers stay current)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_source_input_hashes.py --strict
      - name: retrieval link check
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_map_links.py --strict
      - name: retrieval header index (forward-only gate)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/header_index.py --strict
      - name: Google search-surface route guard
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_search_surface_google_route.py --strict
      - name: CSB-first scanning artifact check
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_csb_scanning_artifact.py --diff "$FORSETI_DIFF_BASE" --strict
      - name: ontology SSOT integrity
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_ontology_ssot.py --strict
      - name: ontology tag validity
        working-directory: ${{ github.workspace }}
        run: |
          python .agents/hooks/check_ontology_tag_validity.py --selftest
          python .agents/hooks/check_ontology_tag_validity.py --strict
      - name: ontology<->runtime drift check
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_ontology_drift.py --strict
      - name: fragrance reference-data integrity
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_fragrance_reference.py --strict
      - name: deletion-evidence (governed deletions carry evidence)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_deletion_evidence.py --strict
      - name: exceptional dcp receipt shape
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_dcp_receipt.py --strict
      - name: silver-lane write contract (no-blur binding)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_silver_lane_registry.py --strict
      - name: review-routing disposition (code lanes carry review disposition)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_review_routing.py --strict
      - name: review-output provenance and integrity
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_review_output_provenance.py --diff "$FORSETI_DIFF_BASE" --strict
      - name: handoff-pointer resolution (packets resolve where referenced)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_handoff_pointers.py --strict
      - name: prompt contract shape gate (output mode and managed-receiver authorization)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_prompt_output_mode.py --strict
      - name: review-summary shape gate (changed review closeouts keep the bound shape)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_review_summary.py --strict
      - name: hash-pin freshness (markdown sha256 pins stay current)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_hash_pin_freshness.py --strict
      - name: shared-helper duplication (added private helper copies name their delta)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_shared_helper_duplication.py --strict
      - name: full-GT claim tripwire (new md claims stay bounded)
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_full_gt_claims.py --changed --strict
      - name: harness coupling contracts (fast generated/pin drift)
        working-directory: ${{ github.workspace }}
        run: |
          python .agents/hooks/check_harness_coupling.py --selftest
          python .agents/hooks/check_harness_coupling.py --strict
      - name: Run tests
        if: steps.pytest-scope.outputs.run_pytest == 'true'
        # Public ubuntu-latest exposes four CPUs; file grouping keeps module-local tests together.
        run: python -m pytest --durations=50 --durations-min=0.25 -n 4 --dist=loadfile
